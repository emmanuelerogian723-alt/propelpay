services:
  - type: web
    name: propelpay
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        value: ""
      - key: PAYSTACK_SECRET_KEY
        value: ""
      - key: PAYSTACK_PUBLIC_KEY
        value: ""
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""

databases:
  - name: propelpay-db
    databaseName: propelpay
    user: propelpay
    plan: free
    ipAllowList: []
